<div id="qwrt-player-container" style="font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; border-radius: 12px; width: 320px; text-align: center;">
    
    <div style="margin-bottom: 15px; min-height: 50px;">
        <div id="song-title" style="font-weight: bold; font-size: 1.1rem; color: #00d1ff;">Loading...</div>
        <div id="station-name" style="font-size: 0.8rem; opacity: 0.7; margin-top: 4px;">QWRT Radio</div>
    </div>

    <audio id="radio-stream" src="https://stream.qwrt.online/listen/qwrt_radio/radio.mp3"></audio>

    <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
        <button id="play-pause-btn" onclick="togglePlay()" style="background: #00d1ff; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-weight: bold; font-size: 1rem;">▶</button>
        
        <div style="display: flex; flex-direction: column; align-items: start;">
            <span style="font-size: 0.7rem; margin-bottom: 3px;">VOLUME</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" oninput="updateVolume(this.value)" style="cursor: pointer;">
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById('radio-stream');
    const playBtn = document.getElementById('play-pause-btn');
    const songDisplay = document.getElementById('song-title');

    // --- PLAYER LOGIC ---
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "⏸"; // Pause Icon
            playBtn.style.background = "#ff4d4d"; // Change color to red when playing
        } else {
            audio.pause();
            playBtn.innerText = "▶"; // Play Icon
            playBtn.style.background = "#00d1ff";
        }
    }

    function updateVolume(val) {
        audio.volume = val;
    }

    // --- API MONITOR (Every 2 Seconds) ---
    async function updateNowPlaying() {
        try {
            const response = await fetch('https://stream.qwrt.online/api/nowplaying/qwrt_radio');
            if (!response.ok) throw new Error('API Unavailable');
            
            const data = await response.json();
            const currentSong = data.now_playing.song.text;

            // Only update the text if it actually changed to prevent flickering
            if (songDisplay.innerText !== currentSong) {
                songDisplay.innerText = currentSong;
            }
        } catch (error) {
            console.error('Metadata Error:', error);
            // Don't overwrite the display with error text so it stays clean
        }
    }

    // Initial check and then set interval
    updateNowPlaying();
    setInterval(updateNowPlaying, 2000);
</script>
