<div id="radio-container">
    <div id="station-info">
        <h2 id="track-title">Loading...</h2>
        <p id="track-artist">Connecting to QWRT Radio</p>
    </div>

    <audio id="radio-player" src="https://stream.qwrt.online/listen/qwrt_radio/radio.mp3"></audio>

    <div class="controls">
        <button id="play-pause" onclick="toggleRadio()">Play</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.7" oninput="changeVolume(this.value)">
    </div>
</div>

<script>
    const player = document.getElementById('radio-player');
    const btn = document.getElementById('play-pause');

    // 1. Play/Pause Toggle
    function toggleRadio() {
        if (player.paused) {
            player.play();
            btn.innerText = "Pause";
        } else {
            player.pause();
            btn.innerText = "Play";
        }
    }

    // 2. Volume Control
    function changeVolume(val) {
        player.volume = val;
    }

    // 3. Metadata Fetch (The "Now Playing" Logic)
    async function getNowPlaying() {
        try {
            // This is the public API for your specific station
            const response = await fetch('https://stream.qwrt.online/api/nowplaying/qwrt_radio');
            const data = await response.json();
            
            const song = data.now_playing.song;
            document.getElementById('track-title').innerText = song.title;
            document.getElementById('track-artist').innerText = song.artist;
        } catch (e) {
            console.log("Metadata error:", e);
        }
    }

    // Update every 15 seconds
    setInterval(getNowPlaying, 15000);
    getNowPlaying(); 
</script>
